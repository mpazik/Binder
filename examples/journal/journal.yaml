# Personal Journaling System
# Minimal schema for daily, weekly, monthly, quarterly, and yearly journals
# Provides: JournalDay, JournalWeek, JournalMonth, JournalQuarter, JournalYear types

# ====================
# JOURNALING SCHEMA FIELDS
# ====================

- configs:
    # ====================
    # FIELDS
    # ====================

    # Temporal identifiers - each journal type has its own period field
    # with the appropriate periodFormat for validation
    - key: dayPeriod
      type: Field
      name: Day Period
      dataType: period
      periodFormat: day
      description: Day identifier in YYYY-MM-DD format (e.g. 2024-03-25)

    - key: weekPeriod
      type: Field
      name: Week Period
      dataType: period
      periodFormat: week
      description: Week identifier in YYYY-W## format (e.g. 2024-W12)

    - key: monthPeriod
      type: Field
      name: Month Period
      dataType: period
      periodFormat: month
      description: Month identifier in YYYY-MM format (e.g. 2024-03)

    - key: quarterPeriod
      type: Field
      name: Quarter Period
      dataType: period
      periodFormat: quarter
      description: Quarter identifier in YYYY-Q# format (e.g. 2024-Q1)

    - key: yearPeriod
      type: Field
      name: Year Period
      dataType: period
      periodFormat: year
      description: Year identifier in YYYY format (e.g. 2024)

    # Journal content fields
    - key: goal
      type: Field
      name: Goal
      dataType: richtext
      richtextFormat: line
      allowMultiple: true
      description: Desired state to achieve — directional, not necessarily all actionable. May not know the full path yet.

    - key: plan
      type: Field
      name: Plan
      dataType: richtext
      richtextFormat: block
      allowMultiple: true
      description: Defined tasks to do — concrete, actionable checklist items that move toward the goals.

    - key: achievements
      type: Field
      name: Achievements
      dataType: richtext
      richtextFormat: line
      allowMultiple: true
      description: Things completed or accomplished worth mentioning for the period.

    - key: events
      type: Field
      name: Events
      dataType: richtext
      richtextFormat: line
      allowMultiple: true
      description: Unexpected things that happened and required attention during the period.

    - key: log
      type: Field
      name: Log
      dataType: richtext
      richtextFormat: line
      allowMultiple: true
      description: Timestamped activity log (one entry per line)

    # Score fields (1-10 scale)
    - key: moodScore
      type: Field
      name: Mood Score
      dataType: integer
      description: Overall mood rating (1-10)

    - key: sleepScore
      type: Field
      name: Sleep Score
      dataType: integer
      description: Sleep quality rating (1-10)

    - key: foodScore
      type: Field
      name: Food Score
      dataType: integer
      description: Nutrition quality rating (1-10)

    - key: workScore
      type: Field
      name: Work Score
      dataType: integer
      description: Work productivity rating (1-10)

    - key: fitnessScore
      type: Field
      name: Fitness Score
      dataType: integer
      description: Exercise/fitness rating (1-10)

    - key: totalScore
      type: Field
      name: Total Score
      dataType: integer
      description: Average of all scores (1-10)

    - key: healthData
      type: Field
      name: Health Data
      dataType: richtext
      richtextFormat: line
      allowMultiple: true
      description: Summary of health data imported from a third party like Apple Health

    - key: intention
      type: Field
      name: Intention
      dataType: richtext
      richtextFormat: line
      description: A principle to operate by — not a task. E.g. "protect mornings for deep work", "don't context-switch before finishing the PR", "ship over polish."

    # ====================
    # TYPES
    # ====================

    - key: JournalDay
      type: Type
      name: Journal Day
      description: Daily journal entry
      fields:
        - dayPeriod: { required: true }
        - intention
        - parent: { only: [JournalWeek] }
        - previous: { only: [JournalDay] }
        - next: { only: [JournalDay] }
        - moodScore
        - sleepScore
        - foodScore
        - workScore
        - fitnessScore
        - totalScore
        - plan
        - achievements
        - events
        - log
        - summary
        - healthData

    - key: JournalWeek
      type: Type
      name: Journal Week
      description: Weekly journal entry
      fields:
        - weekPeriod: { required: true }
        - intention
        - parent: { only: [JournalMonth] }
        - previous: { only: [JournalWeek] }
        - next: { only: [JournalWeek] }
        - totalScore
        - goal
        - plan
        - achievements
        - events
        - summary
        - children: { only: [JournalDay] }

    - key: JournalMonth
      type: Type
      name: Journal Month
      description: Monthly journal entry
      fields:
        - monthPeriod: { required: true }
        - parent: { only: [JournalQuarter] }
        - previous: { only: [JournalMonth] }
        - next: { only: [JournalMonth] }
        - goal
        - plan
        - achievements
        - events
        - summary
        - children: { only: [JournalWeek] }

    - key: JournalQuarter
      type: Type
      name: Journal Quarter
      description: Quarterly journal entry
      fields:
        - quarterPeriod: { required: true }
        - parent: { only: [JournalYear] }
        - previous: { only: [JournalQuarter] }
        - next: { only: [JournalQuarter] }
        - goal
        - plan
        - achievements
        - events
        - summary
        - children: { only: [JournalMonth] }

    - key: JournalYear
      type: Type
      name: Journal Year
      description: Yearly journal entry
      fields:
        - yearPeriod: { required: true }
        - previous: { only: [JournalYear] }
        - next: { only: [JournalYear] }
        - goal
        - plan
        - achievements
        - events
        - summary
        - children: { only: [JournalQuarter] }

# ====================
# NAVIGATION
# ====================

- configs:
    # Views
    - key: journal-day-summary
      type: View
      name: Journal Day Summary
      viewFormat: section
      viewContent: |
        ### {dayPeriod}
        {summary}

    - key: journal-week-summary
      type: View
      name: Journal Week Summary
      viewFormat: section
      viewContent: |
        ### {weekPeriod}
        {summary}

    - key: journal-month-summary
      type: View
      name: Journal Month Summary
      viewFormat: section
      viewContent: |
        ### {monthPeriod}
        {summary}

    - key: journal-quarter-summary
      type: View
      name: Journal Quarter Summary
      viewFormat: section
      viewContent: |
        ### {quarterPeriod}
        {summary}

    - key: journal-day-view
      type: View
      name: Journal Day View
      preamble:
        [
          dayPeriod,
          parent,
          moodScore,
          sleepScore,
          foodScore,
          workScore,
          fitnessScore,
          totalScore,
        ]
      viewContent: |
        # {dayPeriod}

        ## Context ({parent.weekPeriod})

        ### Week Goal
        {parent.goal}

        ### Week Plan
        {parent.plan}

        ## Plan
        {plan}

        ## Achievements
        {achievements}

        ## Events
        {events}

        ## Log
        {log}

        ## Summary
        {summary}

    - key: journal-week-view
      type: View
      name: Journal Week View
      preamble: [weekPeriod, parent, totalScore, goal]
      viewContent: |
        # Week {weekPeriod}

        ## Context ({parent.monthPeriod})

        ### Month Goal
        {parent.goal}

        ### Month Plan
        {parent.plan}

        ## Goal
        {goal}

        ## Plan
        {plan}

        ## Achievements
        {achievements}

        ## Events
        {events}

        ## Days Summary
        {children|view:journal-day-summary}

        ## Summary
        {summary}

    - key: journal-month-view
      type: View
      name: Journal Month View
      preamble: [monthPeriod, parent, goal]
      viewContent: |
        # {monthPeriod}

        ## Context ({parent.quarterPeriod})

        ### Quarter Goal
        {parent.goal}

        ### Quarter Plan
        {parent.plan}

        ## Goal
        {goal}

        ## Plan
        {plan}

        ## Achievements
        {achievements}

        ## Events
        {events}

        ## Weeks Summary
        {children|view:journal-week-summary}

        ## Summary
        {summary}

    - key: journal-quarter-view
      type: View
      name: Journal Quarter View
      preamble: [quarterPeriod, parent, goal]
      viewContent: |
        # {quarterPeriod}

        ## Context ({parent.yearPeriod})

        ### Year Goal
        {parent.goal}

        ### Year Plan
        {parent.plan}

        ## Goal
        {goal}

        ## Plan
        {plan}

        ## Achievements
        {achievements}

        ## Events
        {events}

        ## Months Summary
        {children|view:journal-month-summary}

        ## Summary
        {summary}

    - key: journal-year-view
      type: View
      name: Journal Year View
      preamble: [yearPeriod, goal]
      viewContent: |
        # {yearPeriod}

        ## Goal
        {goal}

        ## Plan
        {plan}

        ## Achievements
        {achievements}

        ## Events
        {events}

        ## Quarters Summary
        {children|view:journal-quarter-summary}

        ## Summary
        {summary}

    # Navigation with markdown views
    - key: nav-journal-day-doc
      type: Navigation
      path: journal/days/{dayPeriod}
      where: { type: JournalDay }
      view: journal-day-view

    - key: nav-journal-week-doc
      type: Navigation
      path: journal/weeks/{weekPeriod}
      where: { type: JournalWeek }
      view: journal-week-view

    - key: nav-journal-month-doc
      type: Navigation
      path: journal/months/{monthPeriod}
      where: { type: JournalMonth }
      view: journal-month-view

    - key: nav-journal-quarter-doc
      type: Navigation
      path: journal/quarters/{quarterPeriod}
      where: { type: JournalQuarter }
      view: journal-quarter-view

    - key: nav-journal-year-doc
      type: Navigation
      path: journal/years/{yearPeriod}
      where: { type: JournalYear }
      view: journal-year-view

# ====================
# SAMPLE DATA
# ====================

- records:
    # Sample year
    - type: JournalYear
      key: jy-2026
      yearPeriod: "2026"
      goal:
        - "Ship the product and grow to 1k users"
        - "Run a half marathon"
        - "Read 24 books (2/month)"
        - "Build a consistent journaling habit"
      plan: |
        - Focus on MVP first, then iterate based on user feedback
        - Training plan: build up to half marathon by October
        - 2 books/month, alternate fiction and non-fiction
        - Use binder journaling system daily
      achievements: []
      events: []
      summary: ""

    # Sample quarter
    - type: JournalQuarter
      key: jq-2026-Q1
      quarterPeriod: "2026-Q1"
      parent: jy-2026
      goal:
        - "Launch the MVP by end of February"
        - "Establish gym routine (4x/week)"
        - "Read 6 books"
        - "Set up meal prep system"
      plan: |
        - Jan: core features + schema system
        - Feb: templates, navigation, polish, launch
        - Mar: user feedback, iterate, first 100 users
        - Gym: Mon/Wed/Fri/Sat, meal prep on Sundays
      achievements: []
      events: []
      summary: ""

    # Sample month
    - type: JournalMonth
      key: jm-2026-02
      monthPeriod: "2026-02"
      parent: jq-2026-Q1
      goal:
        - "Ship templates and navigation features"
        - "Consistent gym routine (4x/week)"
        - "Cook more at home, less takeout"
        - "Read at least 2 books"
      plan: |
        - Week 1: template frontmatter + rendering
        - Week 2: navigation system + includes
        - Week 3: polish, docs, launch prep
        - Week 4: launch MVP
        - Gym: Mon/Wed/Fri + one weekend session
        - Meal prep Sundays, no takeout on weekdays
      achievements: []
      events: []
      summary: ""

    # Sample week
    - type: JournalWeek
      key: jw-2026-W07
      weekPeriod: "2026-W07"
      parent: jm-2026-02
      totalScore: 7
      goal:
        - "Ship the template frontmatter feature"
        - "Hit the gym 3 times"
        - "Meal prep consistently"
      plan: |
        - [ ] 3 gym sessions (Mon, Wed, Fri)
        - [ ] Meal prep on Sunday
        - [ ] Ship the template frontmatter feature
        - [ ] Catch up with Alex over coffee
      achievements:
        - "Shipped the template frontmatter feature"
        - "Hit the gym 3 out of 4 planned sessions"
        - "Meal prepped every Sunday"
      events:
        - "Sara's navigation PR landed — big step for the project"
        - "Coffee with Alex — he's starting a new job next month"
      summary: |
        Solid week overall. Hit the gym 3 times, meal prep saved me
        from ordering pizza twice. Got the frontmatter feature merged
        on Thursday. Skipped Friday's gym though — was too tired after
        the release. Coffee with Alex was great, need to do that more often.

    # Sample days
    - type: JournalDay
      key: jd-2026-02-09
      dayPeriod: "2026-02-09"
      parent: jw-2026-W07
      moodScore: 7
      sleepScore: 6
      foodScore: 8
      workScore: 7
      fitnessScore: 8
      totalScore: 7
      plan: |
        - [ ] Morning gym — upper body
        - [ ] Grocery shopping and meal prep
        - [ ] Work on frontmatter parsing
        - [ ] Call mum
      achievements:
        - "New PR on overhead press"
        - "Got frontmatter parser basic extraction working"
        - "Meal prep done for the whole week"
      events:
        - "Mum wants me to visit next month"
      log:
        - "07:30 - Woke up groggy, snoozed twice. Need to stop staying up late."
        - "08:30 - Gym. Bench felt good, hit a new PR on overhead press."
        - "10:00 - Grocery run. Stocked up for the week."
        - "11:30 - Meal prep — chicken, rice, roasted veggies. Enough for 4 days."
        - "13:00 - Started on the frontmatter parser. YAML edge cases are annoying."
        - "15:30 - Got the basic extraction working. Tests passing."
        - "17:00 - Called mum. She's doing well, wants me to visit next month."
        - "18:30 - Cooked dinner instead of ordering. Small win."
        - "21:00 - Read for a bit, then bed."
      summary: |
        Good day. Gym went well, meal prep done for the week.
        Made decent progress on the parser. Felt good about
