# Project management blueprint
# Provides: Task, Milestone types with Markdown navigation

# ====================
# SCHEMA
# ====================

- author: system
  configs:
    - key: size
      type: Field
      name: Size
      description: Scope and complexity of the task
      dataType: option
      options:
        - key: small
          name: Small
          description: Quick to complete, no decisions needed
        - key: medium
          name: Medium
          description: Some coordination or multiple steps
        - key: large
          name: Large
          description: Significant effort, non-trivial decisions required

    - key: acceptanceCriteria
      type: Field
      name: Acceptance Criteria
      dataType: richtext
      richtextFormat: line
      allowMultiple: true
      description: Conditions that must be met for this task to be considered done

    - key: constraints
      type: Field
      name: Constraints
      dataType: richtext
      richtextFormat: block
      allowMultiple: true
      description: Boundaries that must be respected

    - key: outOfScope
      type: Field
      name: Out of Scope
      dataType: richtext
      richtextFormat: block
      allowMultiple: true
      description: What is deliberately not covered by this task

    - key: Task
      type: Type
      name: Task
      fields:
        - title: { required: true }
        - description
        - details
        - status
        - priority
        - size
        - dueDate
        - acceptanceCriteria
        - constraints
        - outOfScope
        - parent: { only: [Task] }
        - children: { only: [Task] }
        - partOf: { only: [Milestone] }
        - requires: { only: [Task] }
        - requiredBy: { only: [Task] }
        - relatesTo: { only: [Task] }
        - tags

    - key: Milestone
      type: Type
      name: Milestone
      fields:
        - title: { required: true }
        - description
        - details
        - status
        - dueDate
        - acceptanceCriteria
        - constraints
        - contains: { only: [Task] }
        - requires: { only: [Milestone] }
        - requiredBy: { only: [Milestone] }

# ====================
# NAVIGATION
# ====================

- author: system
  configs:
    # --- Task view ---
    - key: task-view
      type: View
      name: Task
      preamble: [key, title, status, priority, size, dueDate, description, tags, partOf, requires, requiredBy, relatesTo, parent, children]
      viewContent: |
        # {title}

        ## Details

        {details}

        ## Acceptance Criteria

        {acceptanceCriteria}

        ## Constraints

        {constraints}

        ## Out of Scope

        {outOfScope}

    # --- Task navigation ---
    - key: nav-tasks
      type: Navigation
      path: tasks/{title}
      where: { type: Task, status: [pending, active, paused] }
      view: task-view

    - key: nav-archive-tasks
      type: Navigation
      path: archive/tasks/{title}
      where: { type: Task, status: [complete, cancelled] }
      view: task-view

    # Backlog index
    - key: nav-backlog
      type: Navigation
      path: backlog
      query:
        filters:
          type: Task
          partOf: { op: empty, value: true }
          status: [pending, active]

    # --- Milestone views ---
    - key: task-list-item
      type: View
      name: Task List Item
      viewFormat: line
      viewContent: |
        - {title} ({priority})

    - key: milestone-view
      type: View
      name: Milestone
      preamble: [key, title, status, dueDate, description, requires, requiredBy]
      viewContent: |
        # {title}

        ## Details

        {details}

        ## Acceptance Criteria

        {acceptanceCriteria}

        ## Constraints

        {constraints}

        ## Pending

        {contains|where:status=pending|view:task-list-item}

        ## Active

        {contains|where:status=active|view:task-list-item}

        ## Complete

        {contains|where:status=complete|view:task-list-item}

    # --- Milestone navigation ---
    - key: nav-milestones-index
      type: Navigation
      path: milestones
      query:
        filters: { type: Milestone, status: { op: notIn, value: [cancelled] } }
        includes: { key: true, title: true, status: true, dueDate: true }

    - key: nav-milestones
      type: Navigation
      path: milestones/{key}
      where: { type: Milestone }
      view: milestone-view

# ====================
# SAMPLE DATA
