# Project management blueprint
# Provides: Task, Milestone types

- author: system
  configs:
    # Types
    - key: Task
      type: Type
      name: Task
      fields:
        - title: { required: true }
        - description
        - status
        - priority
        - dueDate
        - parent: { only: [Task] }
        - children: { only: [Task] }
        - partOf: { only: [Milestone] }

    - key: Milestone
      type: Type
      name: Milestone
      fields:
        - title: { required: true }
        - description
        - status
        - dueDate
        - contains: { only: [Task] }

# Navigation & Views
- author: system
  configs:
    # --- Case 1: Frontmatter + body overlap ---
    # View has {status} in body AND status in preamble (frontmatter).
    # If user edits body status but not frontmatter, the body edit should win.
    - key: task-detail-view
      type: View
      name: Task Detail
      preamble: [status, priority]
      viewContent: |
        # {title}

        **Status:** {status}

        ## Description

        {description}

    # --- Case 2: Duplicate field slot in one view ---
    # View has {title} in two places. If user edits them to different
    # values, extraction should detect a conflict.
    - key: task-summary-view
      type: View
      name: Task Summary
      viewContent: |
        # {title}

        > **Summary:** {title}

        **Status:** {status}

    # Navigation: markdown tasks with preamble (Case 1)
    - key: nav-tasks-md
      type: Navigation
      path: tasks/{key}
      where: { type: Task }
      view: task-detail-view

    # Navigation: markdown tasks with duplicate slot (Case 2)
    - key: nav-tasks-summary
      type: Navigation
      path: summaries/{key}
      where: { type: Task }
      view: task-summary-view

    # --- Case 3: Same field across files ---
    # YAML route at a different path for the same entity. If both files
    # are modified with different values for the same field, sync should
    # detect a cross-file conflict.
    - key: nav-tasks-yaml
      type: Navigation
      path: tasks-yaml/{key}
      where: { type: Task }
      includes:
        key: true
        title: true
        status: true
        description: true

    # Milestones (YAML)
    - key: nav-milestone
      type: Navigation
      path: milestones/{key}
      where: { type: Milestone, status: [pending, active] }
      includes:
        key: true
        title: true
        description: true
        status: true
        dueDate: true
        contains:
          title: true
          status: true

    # Backlog
    - key: nav-backlog
      type: Navigation
      path: backlog
      query:
        filters:
          type: Task
          partOf: { op: empty, value: true }
          status: [pending, active]

