# Personal knowledge management blueprint (PARA-based)
# Provides: Area, Project, Task, Note, Resource types

# ====================
# SCHEMA
# ====================

- author: system
  configs:
    # Fields
    - key: resourceType
      type: Field
      name: Resource Type
      dataType: option
      options:
        - key: book
          name: Book
        - key: article
          name: Article
        - key: video
          name: Video
        - key: podcast
          name: Podcast
        - key: course
          name: Course
        - key: paper
          name: Paper

    # Types
    - key: Area
      type: Type
      description: Life area or responsibility
      fields:
        - title: { required: true }
        - description
        - children: { only: [Project, Note] }

    - key: Task
      type: Type
      description: Personal action item
      fields:
        - title: { required: true }
        - description
        - details
        - status: { default: pending }
        - priority: { default: p3 }
        - dueDate
        - completedAt
        - parent: { only: [Task, Project] }
        - children: { only: [Task] }
        - tags
        - relatesTo

    - key: Project
      type: Type
      description: Personal goal or initiative
      fields:
        - title: { required: true }
        - description
        - details
        - status: { default: pending }
        - priority
        - startDate
        - dueDate
        - completedAt
        - parent: { only: [Area] }
        - children: { only: [Task] }
        - tags
        - relatesTo

    - key: Note
      type: Type
      description: Captured thought or information
      fields:
        - title: { required: true }
        - details
        - parent: { only: [Area] }
        - tags
        - relatesTo

    - key: Resource
      type: Type
      description: Content to consume or reference
      fields:
        - title: { required: true }
        - description
        - summary
        - resourceType: { required: true }
        - url
        - status: { default: pending }
        - tags
        - relatesTo

# ====================
# VIEWS
# ====================

- author: system
  configs:
    - key: task-list-item
      type: View
      name: Task List Item
      viewFormat: line
      viewContent: |
        - {title} ({priority})

    - key: project-list-item
      type: View
      name: Project List Item
      viewFormat: line
      viewContent: |
        - {title} ({status})

    - key: area-view
      type: View
      name: Area
      preamble: [key, title, description]
      viewContent: |
        # {title}

        {description}

    - key: project-view
      type: View
      name: Project
      preamble: [key, title, status, priority, startDate, dueDate, description, tags, parent, relatesTo]
      viewContent: |
        # {title}

        ## Details

        {details}

        ## Tasks

        ### Active

        {children|where:status=active|view:task-list-item}

        ### Pending

        {children|where:status=pending|view:task-list-item}

        ### Complete

        {children|where:status=complete|view:task-list-item}

    - key: task-view
      type: View
      name: Task
      preamble: [key, title, status, priority, dueDate, description, tags, parent]
      viewContent: |
        # {title}

        ## Details

        {details}

    - key: note-view
      type: View
      name: Note
      preamble: [key, title, parent, tags]
      viewContent: |
        # {title}

        {details}

    - key: resource-view
      type: View
      name: Resource
      preamble: [key, title, resourceType, status, url, description, tags, relatesTo]
      viewContent: |
        # {title}

        ## Summary

        {summary}

# ====================
# NAVIGATION
# ====================

- author: system
  configs:
    # --- Areas ---
    - key: nav-areas-index
      type: Navigation
      path: areas/index
      query:
        filters: { type: Area }

    - key: nav-areas-dir
      type: Navigation
      path: areas/{title}/
      where: { type: Area }

    - key: nav-area-entity
      type: Navigation
      path: area
      parent: nav-areas-dir
      view: area-view

    - key: nav-area-projects
      type: Navigation
      path: projects
      parent: nav-areas-dir
      query:
        filters: { type: Project, parent: "{parent.key}" }

    - key: nav-area-notes-dir
      type: Navigation
      path: notes/
      parent: nav-areas-dir

    - key: nav-area-notes-index
      type: Navigation
      path: index
      parent: nav-area-notes-dir
      query:
        filters: { type: Note, parent: "{parent.key}" }

    - key: nav-area-notes-entity
      type: Navigation
      path: "{title}"
      parent: nav-area-notes-dir
      where: { type: Note, parent: "{parent.key}" }
      view: note-view

    - key: nav-area-resources
      type: Navigation
      path: resources
      parent: nav-areas-dir
      query:
        filters: { type: Resource, relatesTo: "{parent.key}" }

    # --- Projects ---
    - key: nav-projects-pending
      type: Navigation
      path: projects/pending
      query:
        filters: { type: Project, status: pending }

    - key: nav-projects-active
      type: Navigation
      path: projects/active
      query:
        filters: { type: Project, status: active }

    - key: nav-projects-dir
      type: Navigation
      path: projects/{title}/
      where: { type: Project, status: [pending, active] }

    - key: nav-project-entity
      type: Navigation
      path: project
      parent: nav-projects-dir
      view: project-view

    - key: nav-project-tasks
      type: Navigation
      path: tasks
      parent: nav-projects-dir
      query:
        filters: { type: Task, parent: "{parent.key}" }

    # --- Tasks ---
    - key: nav-tasks-pending
      type: Navigation
      path: tasks/pending
      query:
        filters: { type: Task, status: pending }

    - key: nav-tasks-active
      type: Navigation
      path: tasks/active
      query:
        filters: { type: Task, status: active }

    # --- Resources ---
    - key: nav-resources-pending
      type: Navigation
      path: resources/pending
      query:
        filters: { type: Resource, status: pending }

    - key: nav-resources-active
      type: Navigation
      path: resources/active
      query:
        filters: { type: Resource, status: active }

    - key: nav-resources-books
      type: Navigation
      path: resources/books
      query:
        filters:
          { type: Resource, resourceType: book, status: [pending, active] }

    - key: nav-resources-articles
      type: Navigation
      path: resources/articles
      query:
        filters:
          { type: Resource, resourceType: article, status: [pending, active] }

    - key: nav-resources-others
      type: Navigation
      path: resources/others
      query:
        filters:
          type: Resource
          resourceType: [video, podcast, course, paper]
          status: [pending, active]

    # --- Archive ---
    - key: nav-archive-projects
      type: Navigation
      path: archive/projects/{title}/
      where: { type: Project, status: [complete, cancelled] }

    - key: nav-archive-project
      type: Navigation
      path: project
      parent: nav-archive-projects
      view: project-view

    - key: nav-archive-resources-books
      type: Navigation
      path: archive/resources/books
      query:
        filters: { type: Resource, resourceType: book, status: complete }

    - key: nav-archive-resources-articles
      type: Navigation
      path: archive/resources/articles
      query:
        filters: { type: Resource, resourceType: article, status: complete }

    - key: nav-archive-resources-others
      type: Navigation
      path: archive/resources/others
      query:
        filters:
          type: Resource
          resourceType: [video, podcast, course, paper]
          status: complete

