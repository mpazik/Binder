items:
  - key: nav-tasks
    where:
      type: Task
      status: { op: in, value: [ pending, active, paused ] }
    path: tasks/{priority} {key}
    view: task-view

  - key: nav-backlog
    where:
      type: Task
      status: draft
    path: tasks/backlog/{priority} {key}
    view: task-view

  - key: nav-tasks-unassigned
    query:
      filters:
        type: Task
        partOf: { op: empty, value: true }
        status: { op: notIn, value: [ complete, cancelled ] }
      includes: { key: true, title: true, status: true, priority: true, module: true }
    path: tasks/unassigned

  - key: nav-archive-tasks
    where:
      type: Task
      status: complete
    path: archive/tasks/{key}
    view: task-view

  - key: nav-archive-tasks-cancelled
    where:
      type: Task
      status: cancelled
    path: archive/tasks/cancelled/{key}
    view: task-view

  - key: nav-milestones-index
    query:
      filters:
        type: Milestone
        status: { op: notIn, value: [ cancelled ] }
      includes: { key: true, title: true, status: true, dueDate: true }
    path: milestones

  - key: nav-milestones
    where:
      type: Milestone
    path: milestones/{key}
    view: milestone-view

  - key: nav-problems-index
    query:
      filters:
        type: Problem
        status: { op: in, value: [ active, paused ] }
      includes: { key: true, title: true, status: true, question: true }
    path: problems

  - key: nav-problems
    where:
      type: Problem
      status: { op: notIn, value: [ cancelled ] }
    path: problems/{key}
    view: problem-view

  - key: nav-archive-problems
    where:
      type: Problem
      status: { op: in, value: [ complete, cancelled ] }
    path: archive/problems/{key}
    view: problem-view

  - key: nav-decisions-index
    query:
      filters:
        type: Decision
        status: { op: notIn, value: [ draft, cancelled ] }
      includes: { key: true, title: true, status: true, decisionProblem: true }
    path: decisions

  - key: nav-decisions
    where:
      type: Decision
      status: { op: notIn, value: [ cancelled ] }
    path: decisions/{key}
    view: decision-view

  - key: nav-archive-decisions
    where:
      type: Decision
      status: cancelled
    path: archive/decisions/{key}
    view: decision-view

  - key: nav-use-cases-index
    query:
      filters: { type: UseCase }
      includes: { key: true, title: true, actor: true }
    path: use-cases

  - key: nav-use-cases
    where:
      type: UseCase
    path: use-cases/{key}
    view: use-case-view

  - key: nav-features-index
    query:
      filters:
        type: Feature
        status: { op: notIn, value: [ draft, cancelled ] }
      includes: { key: true, title: true, status: true, tags: true }
    path: features

  - key: nav-features
    where:
      type: Feature
      status: { op: notIn, value: [ draft, cancelled ] }
      tags: { op: notIn, value: [ data-model, cli, lsp, rendering, data-access, sync ] }
    path: features/{key}
    view: feature-view

  - key: nav-features-data-model
    where:
      type: Feature
      status: { op: notIn, value: [ draft, cancelled ] }
      tags: data-model
    path: features/data-model/{key}
    view: feature-view

  - key: nav-features-cli
    where:
      type: Feature
      status: { op: notIn, value: [ draft, cancelled ] }
      tags: cli
    path: features/cli/{key}
    view: feature-view

  - key: nav-features-lsp
    where:
      type: Feature
      status: { op: notIn, value: [ draft, cancelled ] }
      tags: lsp
    path: features/lsp/{key}
    view: feature-view

  - key: nav-features-rendering
    where:
      type: Feature
      status: { op: notIn, value: [ draft, cancelled ] }
      tags: rendering
    path: features/rendering/{key}
    view: feature-view

  - key: nav-features-data-access
    where:
      type: Feature
      status: { op: notIn, value: [ draft, cancelled ] }
      tags: data-access
    path: features/data-access/{key}
    view: feature-view

  - key: nav-features-sync
    where:
      type: Feature
      status: { op: notIn, value: [ draft, cancelled ] }
      tags: sync
    path: features/sync/{key}
    view: feature-view

  - key: nav-features-draft
    where:
      type: Feature
      status: draft
    path: drafts/features/{key}
    view: feature-view

  - key: nav-archive-features
    where:
      type: Feature
      status: cancelled
    path: archive/features/{key}
    view: feature-view

  - key: nav-concepts-index
    query:
      filters:
        type: Concept
        status: { op: notIn, value: [ draft, cancelled ] }
      includes: { key: true, name: true, description: true, status: true }
    path: concepts

  - key: nav-concepts
    where:
      type: Concept
      status: { op: notIn, value: [ draft, cancelled ] }
    path: concepts/{key}
    view: concept-view

  - key: nav-concepts-draft
    where:
      type: Concept
      status: draft
    path: drafts/concepts/{key}
    view: concept-view

  - key: nav-archive-concepts
    where:
      type: Concept
      status: cancelled
    path: archive/concepts/{key}
    view: concept-view

  - key: nav-contributing
    where:
      type: Note
      tags: contributing
    path: contributing/{key}
    view: note-view

  - key: nav-guides
    where:
      type: Note
      tags: guide
    path: guides/{key}
    view: note-view

  - key: nav-notes
    where:
      type: Note
      tags: { op: notIn, value: [ guide, contributing ] }
    path: notes/{key}
    view: note-view
